<script>
'use strict';
// ╔══════════════════════════════════════════════════╗
// ║  CORE — API, AUTH, ROUTER, UI HELPERS            ║
// ╚══════════════════════════════════════════════════╝

const Auth = {
  token:  () => localStorage.getItem('ep_tok'),
  user:   () => { try { return JSON.parse(localStorage.getItem('ep_usr') || 'null'); } catch { return null; } },
  set:    (tok, usr) => { localStorage.setItem('ep_tok', tok); localStorage.setItem('ep_usr', JSON.stringify(usr)); },
  clear:  () => { localStorage.removeItem('ep_tok'); localStorage.removeItem('ep_usr'); },
  loggedIn:  () => !!localStorage.getItem('ep_tok'),
  isPremium: () => { try { return JSON.parse(localStorage.getItem('ep_usr') || '{}').is_premium || false; } catch { return false; } },
  isAdmin:   () => { try { return JSON.parse(localStorage.getItem('ep_usr') || '{}').is_admin || false; } catch { return false; } },
};

async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  const tok = Auth.token();
  if (tok) headers['Authorization'] = 'Bearer ' + tok;
  const res = await fetch(path, { ...opts, headers,
    body: opts.body && typeof opts.body !== 'string' ? JSON.stringify(opts.body) : opts.body });
  if (res.status === 204) return null;
  const ct = res.headers.get('content-type') || '';
  const data = ct.includes('json') ? await res.json() : await res.blob();
  if (!res.ok) { const e = new Error(data?.detail || `HTTP ${res.status}`); e.status = res.status; throw e; }
  return data;
}
const GET   = p      => apiFetch(p, { method: 'GET' });
const POST  = (p, b) => apiFetch(p, { method: 'POST',  body: b });
const PATCH = (p, b) => apiFetch(p, { method: 'PATCH', body: b });
const PUT   = (p, b) => apiFetch(p, { method: 'PUT',   body: b });
const DEL   = p      => apiFetch(p, { method: 'DELETE' });
const FORM  = (p, fd)=> apiFetch(p, { method: 'POST',  body: fd, headers: {} });

// Offline queue for answers
const OQ = {
  push: item => { const q = OQ.all(); q.push(item); localStorage.setItem('ep_oq', JSON.stringify(q)); },
  all:  ()   => { try { return JSON.parse(localStorage.getItem('ep_oq') || '[]'); } catch { return []; } },
  clear:()   => localStorage.removeItem('ep_oq'),
  flush: async () => {
    if (!navigator.onLine) return;
    const items = OQ.all(); if (!items.length) return;
    const failed = [];
    for (const item of items) { try { await apiFetch(item.url, item.opts); } catch { failed.push(item); } }
    localStorage.setItem('ep_oq', JSON.stringify(failed));
  }
};

// Router
const _PAGES = {};
const _TITLES = { home:'Home', pyq:'Solved PYQs', premium:'Premium Content',
  leaderboard:'Leaderboard', dashboard:'My Dashboard', news:'Exam News',
  library:'My Library', subscription:'Subscription Plans', admin:'Admin Panel',
  login:'Login', register:'Register' };

function registerPage(name, fn) { _PAGES[name] = fn; }

function go(page, params = {}) {
  if (!_PAGES[page]) page = 'home';
  history.pushState({ page, params }, '', '/' + (page === 'home' ? '' : page));
  _render(page, params);
}

function _render(page, params = {}) {
  const fn = _PAGES[page]; if (!fn) { go('home'); return; }
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('topbar-title').textContent = _TITLES[page] || 'ExamPrep';
  const cont = document.getElementById('page-content');
  cont.innerHTML = '<div class="loading-center"><div class="spinner"></div><div class="loading-text">Loading</div></div>';
  Promise.resolve(fn(cont, params)).catch(err => {
    cont.innerHTML = `<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="empty-title">Something went wrong</div><div class="empty-sub">${err.message}</div><button class="btn btn-secondary" style="margin-top:16px" onclick="go('home')">Go Home</button></div>`;
  });
}

window.addEventListener('popstate', e => { if (e.state?.page) _render(e.state.page, e.state.params || {}); });

// Toast
function toast(msg, type = 'info', ms = 3500) {
  const w = document.getElementById('toast-wrap');
  const d = document.createElement('div');
  d.className = `toast ${type}`;
  d.innerHTML = `<div class="toast-dot"></div><span>${msg}</span>`;
  w.appendChild(d);
  setTimeout(() => { d.style.opacity = '0'; d.style.transform = 'translateY(8px)'; d.style.transition = '.25s'; setTimeout(() => d.remove(), 250); }, ms);
}

// Modal
function openModal(title, body, foot) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-foot').innerHTML = foot || '<button class="btn btn-secondary" onclick="closeModal()">Close</button>';
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Theme
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('theme-toggle').classList.toggle('on', next === 'dark');
  localStorage.setItem('ep_theme', next);
}

// Sidebar
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  if (window.innerWidth <= 768) { s.classList.toggle('mobile-open'); }
  else { s.classList.toggle('hidden'); document.getElementById('main').classList.toggle('sidebar-collapsed'); }
}
document.addEventListener('click', e => {
  if (window.innerWidth <= 768) {
    const s = document.getElementById('sidebar');
    if (s.classList.contains('mobile-open') && !e.target.closest('#sidebar') && !e.target.closest('.topbar-menu-btn'))
      s.classList.remove('mobile-open');
  }
});

// Auth UI
function updateAuthUI() {
  const u = Auth.user(), li = Auth.loggedIn(), pm = Auth.isPremium(), adm = Auth.isAdmin();
  const show = (id, v) => { const el = document.getElementById(id); if (el) el.style.display = v ? '' : 'none'; };
  show('nav-login', !li);
  show('nav-logout', li);
  show('nav-dashboard', li);
  show('nav-library', li);
  show('nav-admin', adm);
  show('nav-plans', li && !pm);
  show('nav-pro-badge', pm);
  const tr = document.getElementById('topbar-right');
  if (li && u) {
    const init = (u.full_name || u.email || 'U').charAt(0).toUpperCase();
    tr.innerHTML = `<div class="topbar-user-chip"><div class="user-avatar">${init}</div><span>${u.full_name || u.email.split('@')[0]}</span>${pm ? '<span class="premium-chip">PRO</span>' : ''}</div>${!pm ? '<button class="btn btn-primary btn-sm" onclick="go(\'subscription\')">Get Premium</button>' : ''}`;
  } else {
    tr.innerHTML = `<button class="btn btn-secondary btn-sm" onclick="go('login')">Login</button><button class="btn btn-primary btn-sm" onclick="go('register')">Register</button>`;
  }
}

function requireLogin(msg) {
  if (!Auth.loggedIn()) { toast(msg || 'Please login to continue', 'warn'); go('login'); return false; }
  return true;
}

// Icons
const IC = {
  lock: `<svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" width="13" height="13"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>`,
  play: `<svg viewBox="0 0 24 24" stroke="currentColor" fill="currentColor" stroke-width="0" width="13" height="13"><polygon points="5 3 19 12 5 21"/></svg>`,
  dl:   `<svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" width="13" height="13"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  eye:  `<svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" width="13" height="13"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  chk:  `<svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>`,
  arr:  `<svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" width="13" height="13"><polyline points="9 18 15 12 9 6"/></svg>`,
};

// ╚══════════════════════════════════════════════════╝

    <div class="stat-grid" style="margin-bottom:24px">

      <div class="stat-card"><div class="stat-val">1000+</div><div class="stat-lbl">Questions</div></div>
      <div class="stat-card"><div class="stat-val">Free</div><div class="stat-lbl">PYQ Access</div></div>

    <div style="display:grid;grid-template-columns:1fr 320px;gap:20px" id="home-grid">

        <div style="font-size:14px;font-weight:800;color:var(--c-text);margin-bottom:12px;letter-spacing:-.3px">Quick Access</div>

    <div class="auth-left">
      <div class="auth-left-title">Prepare Smarter.<br>Score Higher.</div>

      <div class="auth-feature-list">${['Free access to all PYQs from 2013–2024','Detailed step-by-step solutions','Premium DPPs and chapterwise tests','Real exam interface with timer','Performance dashboard and leaderboard'].map(f => `<div class="auth-feature"><div class="auth-feature-dot"></div>${f}</div>`).join('')}</div>

async function doLogin() {
  const em = document.getElementById('l-email').value.trim();
  const pw = document.getElementById('l-pass').value;
  const errEl = document.getElementById('l-err');
  const btn = document.getElementById('login-btn');
  if (!em || !pw) { errEl.textContent = 'Please enter email and password.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const d = await POST('/api/auth/login', { email: em, password: pw });
    Auth.set(d.access_token, d.user);
    updateAuthUI();
    toast('Welcome back!', 'ok');
    go('home');
  } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; }
}

registerPage('register', function(el) {
  el.innerHTML = `<div class="auth-split fade-in" style="min-height:calc(100vh - 56px)">
    <div class="auth-left">
      <div class="auth-left-title">Start Your Journey<br>to Success.</div>
      <div class="auth-left-sub">Create your free account and get instant access to thousands of solved PYQs with detailed solutions.</div>
      <div class="auth-feature-list">${['No credit card required for free access','Instant PYQ access after registration','Track performance with personal dashboard','Compete on the leaderboard','Unlock premium for DPPs and mocks'].map(f => `<div class="auth-feature"><div class="auth-feature-dot"></div>${f}</div>`).join('')}</div>
    </div>
    <div class="auth-right"><div class="auth-form-wrap">
      <div class="auth-title">Create your account</div>
      <div class="auth-sub">Already registered? <a href="#" onclick="go('login');return false">Sign in</a></div>
      <div id="r-err" style="display:none;background:var(--c-red-l);color:var(--c-red);padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;margin-bottom:14px;border-left:3px solid var(--c-red)"></div>
      <div class="form-group"><label class="form-label">Full name</label><input id="r-name" type="text" class="form-control" placeholder="Your full name"></div>
      <div class="form-group"><label class="form-label">Email address</label><input id="r-email" type="email" class="form-control" placeholder="you@example.com"></div>
      <div class="form-group"><label class="form-label">Password</label><input id="r-pass" type="password" class="form-control" placeholder="At least 6 characters" onkeyup="if(event.key==='Enter')doRegister()"></div>
      <button id="reg-btn" class="btn btn-primary btn-lg" style="width:100%;margin-top:4px" onclick="doRegister()">Create Free Account</button>
    </div></div>
  </div>`;
});

async function doRegister() {
  const nm = document.getElementById('r-name').value.trim();
  const em = document.getElementById('r-email').value.trim();
  const pw = document.getElementById('r-pass').value;
  const errEl = document.getElementById('r-err');
  const btn = document.getElementById('reg-btn');
  if (!em || !pw) { errEl.textContent = 'Email and password are required.'; errEl.style.display = 'block'; return; }
  if (pw.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const d = await POST('/api/auth/register', { email: em, password: pw, full_name: nm || undefined });
    Auth.set(d.access_token, d.user);
    updateAuthUI();
    toast('Account created! Welcome.', 'ok');
    go('home');
  } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Create Free Account'; }
}

function doLogout() { Auth.clear(); updateAuthUI(); toast('Logged out.', 'info'); go('home'); }

(function boot() {

  window.addEventListener('online',  () => { document.getElementById('offline-bar').classList.remove('visible'); OQ.flush(); });

})();
